<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>UWR Waypoint Editor</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        background: #07080e;
        color: #dde1ee;
        font-family: "Segoe UI", system-ui, sans-serif;
        display: flex;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Left: map canvas ── */
      #left {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-width: 0;
        overflow: hidden;
      }
      #toolbar {
        padding: 10px 14px;
        background: #0d0d18;
        display: flex;
        align-items: center;
        gap: 10px;
        border-bottom: 1px solid #1e1e32;
        flex-shrink: 0;
      }
      #toolbar h1 {
        font-size: 13px;
        font-weight: 600;
        color: #3b7ff5;
        letter-spacing: 0.08em;
      }
      #map-wrap {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
        background: #06060a;
        position: relative;
      }
      #map-canvas {
        cursor: crosshair;
        display: block;
        max-width: 100%;
        max-height: 100%;
      }
      #drop-hint {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        pointer-events: none;
        color: #444;
      }
      #drop-hint .big {
        font-size: 40px;
      }
      #drop-hint span {
        font-size: 13px;
      }

      /* ── Right: output panel ── */
      #right {
        width: 360px;
        flex-shrink: 0;
        background: #0a0a16;
        border-left: 1px solid #1e1e32;
        display: flex;
        flex-direction: column;
      }
      #panel-header {
        padding: 12px 14px;
        border-bottom: 1px solid #1e1e32;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #panel-header h2 {
        font-size: 13px;
        font-weight: 600;
      }
      #wp-list {
        flex: 1;
        overflow-y: auto;
        padding: 8px;
        font-size: 11px;
        font-family: "Consolas", "Courier New", monospace;
      }
      .wp-item {
        padding: 5px 8px;
        border-radius: 4px;
        margin-bottom: 3px;
        background: #111122;
        color: #88aaff;
        display: flex;
        justify-content: space-between;
      }
      .wp-item .prog {
        color: #3b7ff5;
      }
      #code-wrap {
        border-top: 1px solid #1e1e32;
      }
      #code-header {
        padding: 8px 14px;
        font-size: 11px;
        color: #555;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #code-output {
        padding: 10px 14px;
        font-size: 10.5px;
        line-height: 1.7;
        color: #a8ff00;
        font-family: "Consolas", "Courier New", monospace;
        background: #050509;
        max-height: 220px;
        overflow-y: auto;
        white-space: pre;
      }

      /* ── Buttons ── */
      button {
        background: #12121e;
        border: 1px solid #2a2a48;
        color: #aaa;
        padding: 5px 11px;
        cursor: pointer;
        border-radius: 5px;
        font-size: 12px;
        transition:
          border-color 0.15s,
          color 0.15s;
      }
      button:hover {
        border-color: #3b7ff5;
        color: #fff;
      }
      .btn-primary {
        background: #1a3a7a;
        border-color: #3b7ff5;
        color: #90bdff;
      }
      .btn-primary:hover {
        background: #3b7ff5;
        color: #fff;
      }
      .btn-danger {
        border-color: #5a1a1a;
        color: #ff6666;
      }
      .btn-danger:hover {
        background: #5a1a1a;
      }

      #wp-count {
        font-size: 12px;
        color: #555;
        margin-left: 6px;
      }
    </style>
  </head>
  <body>
    <div id="left">
      <div id="toolbar">
        <h1>UWR — Waypoint Editor</h1>
        <input
          type="file"
          id="file-input"
          accept="image/*"
          style="display: none"
        />
        <button onclick="document.getElementById('file-input').click()">
          Load map.png
        </button>
        <span id="wp-count">0 waypoints</span>
        <button onclick="undoLast()">Undo</button>
        <button class="btn-danger" onclick="clearAll()">Clear All</button>
        <span style="font-size: 11px; color: #333; margin-left: auto">
          Click on the map to place waypoints in order
        </span>
      </div>
      <div id="map-wrap">
        <canvas id="map-canvas" width="1" height="1"></canvas>
        <div id="drop-hint">
          <div class="big">🗺️</div>
          <span>Click "Load map.png" to start</span>
          <span style="font-size: 11px">Find it at: src/assets/map.png</span>
        </div>
      </div>
    </div>

    <div id="right">
      <div id="panel-header">
        <h2>Waypoints</h2>
        <button class="btn-primary" onclick="copyCode()" id="copy-btn">
          Copy Code
        </button>
      </div>
      <div id="wp-list"></div>
      <div id="code-wrap">
        <div id="code-header">
          <span>Generated TypeScript</span>
          <span id="code-status"></span>
        </div>
        <pre id="code-output">
// Place waypoints on the map to generate code</pre
        >
      </div>
    </div>

    <script>
      // ── State ──────────────────────────────────────────────────────────────────
      const canvas = document.getElementById("map-canvas");
      const ctx = canvas.getContext("2d");
      const mapWrap = document.getElementById("map-wrap");
      let img = null;
      let waypoints = []; // [{imgPctX, imgPctY}]

      // Map world dimensions (must match src/waypoints.ts)
      const MAP_W = 24.22,
        MAP_D = 17.6;

      // ── Load image ─────────────────────────────────────────────────────────────
      document.getElementById("file-input").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const url = URL.createObjectURL(file);
        img = new Image();
        img.onload = () => {
          document.getElementById("drop-hint").style.display = "none";
          fitAndDraw();
        };
        img.src = url;
      });

      // ── Canvas sizing ──────────────────────────────────────────────────────────
      function fitAndDraw() {
        if (!img) return;
        const maxW = mapWrap.clientWidth;
        const maxH = mapWrap.clientHeight;
        const scale = Math.min(maxW / img.width, maxH / img.height, 1);
        canvas.width = Math.round(img.width * scale);
        canvas.height = Math.round(img.height * scale);
        draw();
      }

      window.addEventListener("resize", fitAndDraw);

      // ── Draw canvas ────────────────────────────────────────────────────────────
      function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        if (img) ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

        // Path lines
        if (waypoints.length > 1) {
          ctx.beginPath();
          ctx.strokeStyle = "rgba(59, 127, 245, 0.65)";
          ctx.lineWidth = 2.5;
          ctx.setLineDash([6, 4]);
          waypoints.forEach((wp, i) => {
            const [px, py] = toCanvas(wp);
            i === 0 ? ctx.moveTo(px, py) : ctx.lineTo(px, py);
          });
          ctx.stroke();
          ctx.setLineDash([]);
        }

        // Dots + labels
        waypoints.forEach((wp, i) => {
          const [px, py] = toCanvas(wp);
          // outer ring
          ctx.beginPath();
          ctx.arc(px, py, 10, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(7, 8, 14, 0.6)";
          ctx.fill();
          // inner dot
          ctx.beginPath();
          ctx.arc(px, py, 5.5, 0, Math.PI * 2);
          ctx.fillStyle =
            i === 0
              ? "#a8ff00"
              : i === waypoints.length - 1
                ? "#ff6060"
                : "#3b7ff5";
          ctx.strokeStyle = "white";
          ctx.lineWidth = 1.5;
          ctx.fill();
          ctx.stroke();
          // index label
          ctx.fillStyle = "white";
          ctx.font = "bold 10px monospace";
          ctx.textAlign = "center";
          ctx.textBaseline = "top";
          ctx.fillText(i + "", px, py + 12);
        });
      }

      function toCanvas(wp) {
        return [
          (wp.imgPctX / 100) * canvas.width,
          (wp.imgPctY / 100) * canvas.height,
        ];
      }

      // ── Click to add waypoint ──────────────────────────────────────────────────
      canvas.addEventListener("click", (e) => {
        if (!img) return;
        const rect = canvas.getBoundingClientRect();
        const imgPctX = ((e.clientX - rect.left) / canvas.width) * 100;
        const imgPctY = ((e.clientY - rect.top) / canvas.height) * 100;
        waypoints.push({ imgPctX, imgPctY });
        refresh();
      });

      // ── Undo / Clear ──────────────────────────────────────────────────────────
      function undoLast() {
        waypoints.pop();
        refresh();
      }
      function clearAll() {
        waypoints = [];
        refresh();
      }

      // ── Coordinate conversion ─────────────────────────────────────────────────
      function toWorld(pctX, pctY) {
        return {
          x: +((pctX / 100) * MAP_W - MAP_W / 2).toFixed(2),
          z: +((pctY / 100) * MAP_D - MAP_D / 2).toFixed(2),
        };
      }

      // ── Refresh everything ────────────────────────────────────────────────────
      function refresh() {
        draw();
        updateList();
        updateCode();
        document.getElementById("wp-count").textContent =
          `${waypoints.length} waypoint${waypoints.length !== 1 ? "s" : ""}`;
      }

      function updateList() {
        const n = waypoints.length;
        const html = waypoints
          .map((wp, i) => {
            const prog = n <= 1 ? (i === 0 ? 0 : 1) : i / (n - 1);
            const { x, z } = toWorld(wp.imgPctX, wp.imgPctY);
            return `<div class="wp-item">
        <span class="prog">p=${prog.toFixed(2)}</span>
        <span>x: ${x.toFixed(2)},  z: ${z.toFixed(2)}</span>
      </div>`;
          })
          .join("");
        document.getElementById("wp-list").innerHTML =
          html ||
          '<div style="padding:8px;color:#333;font-size:11px;">No waypoints yet</div>';
      }

      function updateCode() {
        const n = waypoints.length;
        const codeEl = document.getElementById("code-output");
        if (n === 0) {
          codeEl.textContent = "// Place waypoints on the map to generate code";
          return;
        }
        const lines = waypoints.map((wp, i) => {
          const prog = n <= 1 ? 0 : +(i / (n - 1)).toFixed(2);
          const { x, z } = toWorld(wp.imgPctX, wp.imgPctY);
          const pad = prog === 1 ? "" : " "; // align decimals
          return `  { progress: ${pad}${prog.toFixed(2)}, x: ${x >= 0 ? " " : ""}${x.toFixed(2)}, z: ${z >= 0 ? " " : ""}${z.toFixed(2)} },`;
        });
        codeEl.textContent =
          `const WAYPOINTS: Waypoint[] = [\n` + lines.join("\n") + `\n];`;
        document.getElementById("code-status").textContent = `${n} points`;
      }

      function copyCode() {
        const text = document.getElementById("code-output").textContent;
        if (!text || text.startsWith("//")) return;
        navigator.clipboard.writeText(text).then(() => {
          const btn = document.getElementById("copy-btn");
          btn.textContent = "✓ Copied!";
          btn.style.background = "#1a4a1a";
          setTimeout(() => {
            btn.textContent = "Copy Code";
            btn.style.background = "";
          }, 1800);
        });
      }
    </script>
  </body>
</html>
